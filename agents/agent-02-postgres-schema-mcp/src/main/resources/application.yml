spring:
  application:
    name: postgres-schema-mcp
  main:
    web-application-type: none
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:55432}/${POSTGRES_DB:mcp_demo}
    username: ${POSTGRES_USER:mcp_user}
    password: ${POSTGRES_PASSWORD:mcp_password}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    mcp:
      server:
        stdio: true
        name: postgres-schema-mcp
        version: 0.1.0
    bedrock:
      aws:
        region: ${AWS_REGION:us-east-1}
      converse:
        chat:
          options:
            model: ${BEDROCK_MODEL_ID:anthropic.claude-3-5-sonnet-20240620-v1:0}
            temperature: 0.1
            max-tokens: 600

app:
  ai:
    provider: ${APP_AI_PROVIDER:mock}
  sql:
    max-query-limit: ${APP_MAX_QUERY_LIMIT:50}
