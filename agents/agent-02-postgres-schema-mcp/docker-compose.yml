services:
  postgres:
    image: postgres:16
    container_name: postgres-schema-mcp-demo
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mcp_demo}
      POSTGRES_USER: ${POSTGRES_USER:-mcp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcp_password}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mcp_user} -d ${POSTGRES_DB:-mcp_demo}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-schema-mcp-data:/var/lib/postgresql/data

volumes:
  postgres-schema-mcp-data:
